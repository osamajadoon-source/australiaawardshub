name: Daily Masters Research Position Finder

on:
  schedule:
    # 21:00 UTC = ~7am AEST / 8am AEDT — offset 1 hour after the PhD workflow
    # so the two never try to push to main at the same time.
    - cron: '0 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  find-masters-position:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Masters research position finder
        id: scrape
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/scrape_masters_positions.py

      - name: Open Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add daily Masters research position listing"
          branch: daily-masters-listing
          delete-branch: true
          title: "New Masters research position (auto-merged)"
          body: |
            Found and published automatically by the daily Masters research position finder.
            This PR is auto-merged immediately after creation — kept only as a record.
          add-paths: |
            data/masters-positions.json
            masters-research-positions.html
            masters-*.html

      - name: Auto-merge the Pull Request
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch

      - name: Email notification of new listings
        if: steps.scrape.outputs.new_count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.scrape.outputs.new_count }} new Masters position(s) added to Australia Awards Hub"
          to: osamajadoon@gmail.com
          from: Australia Awards Hub Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.scrape.outputs.new_count }} new Masters research position(s) were found and published today:

            ${{ steps.scrape.outputs.new_titles }}

            Browse all: https://australiaawardshub.com/masters-research-positions
