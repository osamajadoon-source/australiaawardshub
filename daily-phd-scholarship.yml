name: Daily PhD & Research Position Finder

on:
  schedule:
    # 20:00 UTC = ~6am AEST / 7am AEDT. Adjust to taste.
    - cron: '0 20 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  find-phd-position:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PhD/research position finder
        id: scrape
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/scrape_phd_positions.py

      - name: Open Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add daily PhD/research position listing"
          branch: daily-phd-listing
          delete-branch: true
          title: "New PhD/research position (auto-merged)"
          body: |
            Found and published automatically by the daily PhD/research position finder.
            This PR is auto-merged immediately after creation — kept only as a record.
          add-paths: |
            data/phd-positions.json
            phd-research-positions.html
            phd-*.html

      - name: Auto-merge the Pull Request
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch

      - name: Email notification of new listings
        if: steps.scrape.outputs.new_count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.scrape.outputs.new_count }} new PhD position(s) added to Australia Awards Hub"
          to: osamajadoon@gmail.com
          from: Australia Awards Hub Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.scrape.outputs.new_count }} new PhD/research position(s) were found and published today:

            ${{ steps.scrape.outputs.new_titles }}

            Browse all: https://australiaawardshub.com/phd-research-positions
