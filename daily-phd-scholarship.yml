name: Daily PhD & Research Position Finder

on:
  schedule:
    # 20:00 UTC = ~6am AEST / 7am AEDT. Adjust to taste.
    - cron: '0 20 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  find-phd-position:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PhD/research position finder
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/scrape_phd_positions.py

      - name: Open Pull Request for review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add daily PhD/research position listing"
          branch: daily-phd-listing
          delete-branch: true
          title: "New PhD/research position — review before merging"
          body: |
            Found automatically by the daily PhD/research position finder.

            Please check before merging (for each listing):
            - [ ] The listing is a real, currently open position (not expired)
            - [ ] The title and description are accurate
            - [ ] The official link works

            If nothing new was found today, this PR will not be created.
          add-paths: |
            data/phd-positions.json
            phd-research-positions.html
